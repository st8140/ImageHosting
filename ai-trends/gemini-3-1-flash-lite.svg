<svg width="100%" viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: sans-serif; }</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Gemini 3.1 Flash-Lite：低遅延 × 1/8コストで量産運用へ</text>

  <!-- ── Flash-Lite 特性 3つ ── -->
  <rect x="48" y="44" width="175" height="54" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="136" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">TTFT 約2.5倍高速化</text>
  <text x="136" y="80" text-anchor="middle" font-size="11" fill="#0F6E56">363 tokens/sec（+45%）</text>
  <text x="136" y="95" text-anchor="middle" font-size="11" fill="#0F6E56">低遅延・高スループット</text>

  <rect x="253" y="44" width="175" height="54" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="340" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">Thinking Levels</text>
  <text x="340" y="80" text-anchor="middle" font-size="11" fill="#534AB7">推論強度を動的に調整</text>
  <text x="340" y="95" text-anchor="middle" font-size="11" fill="#534AB7">速度・コスト・品質を制御</text>

  <rect x="458" y="44" width="175" height="54" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="545" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#412402">Pro比 1/8コスト</text>
  <text x="545" y="80" text-anchor="middle" font-size="11" fill="#854F0B">入力 $0.25 / 1M tokens</text>
  <text x="545" y="95" text-anchor="middle" font-size="11" fill="#854F0B">出力 $1.50 / 1M tokens</text>

  <!-- ── Thinking Levels 詳細 ── -->
  <text x="340" y="122" text-anchor="middle" font-size="11" fill="#777">Thinking Levels：タスクに応じた推論コスト制御</text>

  <rect x="48" y="130" width="175" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="136" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">低推論（速度優先）</text>
  <text x="136" y="166" text-anchor="middle" font-size="11" fill="#0F6E56">分類・ルーティング・タグ付け</text>

  <rect x="253" y="130" width="175" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">中推論（バランス）</text>
  <text x="340" y="166" text-anchor="middle" font-size="11" fill="#534AB7">要約・比較・SQL生成</text>

  <rect x="458" y="130" width="175" height="44" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="545" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#501313">高推論（品質優先）</text>
  <text x="545" y="166" text-anchor="middle" font-size="11" fill="#A32D2D">複雑仕様・複数制約コード</text>

  <!-- ── カスケード設計 ── -->
  <text x="340" y="194" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Flash-Lite × Pro カスケード設計（役割分担）</text>

  <!-- ステップ1 -->
  <rect x="48" y="204" width="142" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="119" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53">Step 1</text>
  <text x="119" y="238" text-anchor="middle" font-size="11" fill="#185FA5">Flash-Lite で一次判定</text>
  <text x="119" y="253" text-anchor="middle" font-size="10" fill="#185FA5">意図分類・危険度・欠落確認</text>

  <!-- 矢印 -->
  <line x1="190" y1="232" x2="214" y2="232" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ステップ2 -->
  <rect x="214" y="204" width="142" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="285" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53">Step 2</text>
  <text x="285" y="238" text-anchor="middle" font-size="11" fill="#185FA5">簡単→Flash-Liteで完結</text>
  <text x="285" y="253" text-anchor="middle" font-size="10" fill="#185FA5">定型回答・要約・抽出</text>

  <!-- 矢印 -->
  <line x1="356" y1="232" x2="380" y2="232" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ステップ3 -->
  <rect x="380" y="204" width="142" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="451" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#26215C">Step 3</text>
  <text x="451" y="238" text-anchor="middle" font-size="11" fill="#534AB7">難/高リスク→Proへ</text>
  <text x="451" y="253" text-anchor="middle" font-size="10" fill="#534AB7">深い推論・例外処理・検証</text>

  <!-- 矢印 -->
  <line x1="522" y1="232" x2="546" y2="232" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ステップ4 -->
  <rect x="546" y="204" width="86" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="589" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53">Step 4</text>
  <text x="589" y="238" text-anchor="middle" font-size="11" fill="#185FA5">量産出力</text>
  <text x="589" y="253" text-anchor="middle" font-size="10" fill="#185FA5">JSON/SQL/UI</text>

  <!-- 役割まとめ -->
  <rect x="48" y="276" width="280" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="188" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">3.1 Pro（司令塔）</text>
  <text x="188" y="314" text-anchor="middle" font-size="11" fill="#534AB7">要件整理・プロンプト設計・難問処理</text>
  <text x="188" y="328" text-anchor="middle" font-size="10" fill="#534AB7">ARC-AGI-2: 77.1% / 科学知識: 94.3%</text>

  <rect x="352" y="276" width="280" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="492" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">Flash-Lite（実行役）</text>
  <text x="492" y="314" text-anchor="middle" font-size="11" fill="#185FA5">大量処理・構造化出力の量産・ストリーミング</text>
  <text x="492" y="328" text-anchor="middle" font-size="10" fill="#185FA5">LiveCodeBench: 72.0% / MMMU-Pro: 76.8%</text>

  <!-- ── 導入チェック ── -->
  <rect x="48" y="346" width="584" height="70" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5" stroke-dasharray="5 3"/>
  <text x="340" y="366" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">導入時の確認事項</text>
  <text x="175" y="385" text-anchor="middle" font-size="11" fill="#444441">データ取り扱い・監査ログ要件</text>
  <text x="340" y="385" text-anchor="middle" font-size="11" fill="#444441">構造化出力スキーマ・バリデーション</text>
  <text x="510" y="385" text-anchor="middle" font-size="11" fill="#444441">Thinking Levelsの既定値設計</text>
  <text x="175" y="404" text-anchor="middle" font-size="11" fill="#444441">レート制限・ピーク時スケール設計</text>
  <text x="340" y="404" text-anchor="middle" font-size="11" fill="#444441">オンライン前提（オフライン不可）</text>
  <text x="510" y="404" text-anchor="middle" font-size="11" fill="#444441">Vertex AI での運用設計</text>

  <!-- まとめ -->
  <rect x="48" y="430" width="584" height="36" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="340" y="453" text-anchor="middle" font-size="12" font-weight="500" fill="#04342C">Proで設計しFlash-Liteで量産実行 → 「賢いデモ」から「回る仕組み」へ</text>
</svg>