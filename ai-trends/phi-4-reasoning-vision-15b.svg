<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: sans-serif; }</style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1a1a1a">Microsoft Phi-4-reasoning-vision-15B：小型・高効率マルチモーダルAI</text>

  <!-- ── 3大技術的特徴 ── -->
  <text x="340" y="52" text-anchor="middle" font-size="11" fill="#777">3つの差別化技術</text>

  <!-- 特徴① データキュレーション -->
  <rect x="48" y="60" width="184" height="68" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="140" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">① データキュレーション</text>
  <text x="140" y="97" text-anchor="middle" font-size="11" fill="#0F6E56">学習データ 約2,000億トークン</text>
  <text x="140" y="113" text-anchor="middle" font-size="11" fill="#0F6E56">競合の約1/5で高品質設計</text>
  <text x="140" y="120" text-anchor="middle" font-size="10" fill="#1D9E75">誤答修復・破綻データ再利用</text>

  <!-- 特徴② 混合推論 20/80 -->
  <rect x="248" y="60" width="184" height="68" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="340" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">② 混合推論（20/80）</text>
  <text x="340" y="97" text-anchor="middle" font-size="11" fill="#534AB7">推論あり 20% ／ 即答 80%</text>
  <text x="340" y="113" text-anchor="middle" font-size="11" fill="#534AB7">プロンプトで制御可能</text>
  <text x="340" y="120" text-anchor="middle" font-size="10" fill="#7F77DD">不要な推論を排除し遅延削減</text>

  <!-- 特徴③ 高解像度UI -->
  <rect x="448" y="60" width="184" height="68" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="540" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#412402">③ 高解像度UI対応</text>
  <text x="540" y="97" text-anchor="middle" font-size="11" fill="#854F0B">SigLIP-2 × mid-fusion</text>
  <text x="540" y="113" text-anchor="middle" font-size="11" fill="#854F0B">動的解像度（最大720p級）</text>
  <text x="540" y="120" text-anchor="middle" font-size="10" fill="#BA7517">ScreenSpot v2: 88.2%</text>

  <!-- ── 混合推論の詳細 ── -->
  <text x="340" y="150" text-anchor="middle" font-size="11" fill="#555">混合推論の使い分けパターン</text>

  <rect x="48" y="158" width="270" height="52" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="183" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#501313">推論あり（CoT）→ 品質優先</text>
  <text x="183" y="194" text-anchor="middle" font-size="11" fill="#A32D2D">数理・監査・図表論理読解・根拠説明が必要な場面</text>

  <rect x="362" y="158" width="270" height="52" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="497" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">即答モード → 速度優先</text>
  <text x="497" y="194" text-anchor="middle" font-size="11" fill="#0F6E56">OCR・UI操作・定型抽出・キャプション生成</text>

  <!-- ── B2B 導入シナリオ ── -->
  <text x="340" y="232" text-anchor="middle" font-size="11" fill="#555">B2B 導入シナリオ</text>

  <rect x="48" y="240" width="135" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="116" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53">UIエージェント</text>
  <text x="116" y="274" text-anchor="middle" font-size="10" fill="#185FA5">社内SaaS操作の半自動化</text>
  <text x="116" y="288" text-anchor="middle" font-size="10" fill="#185FA5">設定変更・レポート取得</text>

  <rect x="195" y="240" width="135" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="263" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53">バックオフィス</text>
  <text x="263" y="274" text-anchor="middle" font-size="10" fill="#185FA5">請求書・領収書・帳票</text>
  <text x="263" y="288" text-anchor="middle" font-size="10" fill="#185FA5">読取・分類・例外確認</text>

  <rect x="342" y="240" width="135" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="410" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53">製造・保全</text>
  <text x="410" y="274" text-anchor="middle" font-size="10" fill="#185FA5">現場写真×指示書照合</text>
  <text x="410" y="288" text-anchor="middle" font-size="10" fill="#185FA5">手順逸脱の検知</text>

  <rect x="489" y="240" width="143" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="561" y="258" text-anchor="middle" font-size="11" font-weight="600" fill="#042C53">営業・企画</text>
  <text x="561" y="274" text-anchor="middle" font-size="10" fill="#185FA5">図表・提案資料の要点抽出</text>
  <text x="561" y="288" text-anchor="middle" font-size="10" fill="#185FA5">競合資料の比較読解</text>

  <!-- ── 強みと弱みの評価軸 ── -->
  <text x="340" y="320" text-anchor="middle" font-size="11" fill="#555">評価軸マップ：重心は「遅延・コスト・運用性」</text>

  <rect x="48" y="328" width="284" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="190" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="#04342C">Phi-4 が得意な領域</text>
  <text x="190" y="363" text-anchor="middle" font-size="11" fill="#0F6E56">低遅延 / 低コスト / オンプレ・閉域運用</text>
  <text x="190" y="378" text-anchor="middle" font-size="11" fill="#0F6E56">UIグラウンディング / 帳票 / 現場写真</text>

  <rect x="348" y="328" width="284" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
  <text x="490" y="346" text-anchor="middle" font-size="12" font-weight="600" fill="#501313">大型モデルが有利な領域</text>
  <text x="490" y="363" text-anchor="middle" font-size="11" fill="#A32D2D">最高難度の数学推論 / 汎用理解</text>
  <text x="490" y="378" text-anchor="middle" font-size="11" fill="#A32D2D">（MMMU 54.3% — 32B+には届かない）</text>

  <!-- ── 提供形態・まとめ ── -->
  <rect x="48" y="402" width="584" height="54" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="422" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">提供形態 &amp; 導入のポイント</text>
  <text x="220" y="440" text-anchor="middle" font-size="11" fill="#444441">Microsoft Foundry / Hugging Face / GitHub</text>
  <text x="480" y="440" text-anchor="middle" font-size="11" fill="#444441">オープンウェイト・寛容ライセンス → 自社評価・微調整・閉域運用可</text>
  <text x="340" y="452" text-anchor="middle" font-size="10" fill="#5F5E5A">導入の主戦場はモデル選びより「業務設計 × 推論制御 × 運用最適化」へ</text>
</svg>